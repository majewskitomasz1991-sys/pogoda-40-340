<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pogoda 40-340</title>
<style>
body{background:#000;color:#fff;font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center}
.b{background:#1a1d29;border-radius:24px;padding:40px;margin:15px auto;max-width:800px}
.h{font-size:24px;color:#8b92b0;margin-bottom:20px}
.t{font-size:90px;font-weight:bold;line-height:1;letter-spacing:-2px;margin:15px 0}
.d{font-size:28px;color:#8b92b0;margin:15px 0}
.i{width:100%;max-width:500px;border-radius:12px;margin:20px auto;display:block;background:#0f1117}
.f{font-size:18px;color:#8b92b0;margin-top:30px}
</style>
</head>
<body>
<div class="b">
<div class="h">Katowice 40-340</div>
<div class="d" id="b">--.--.----</div>
<img class="i" id="p" src="http://v2.wttr.in/Katowice_0pq_lang=pl_transparency=200.png" alt="pogoda">
<div class="t" id="a">--:--:--</div>
<div class="f">Miłego dnia, uważaj na siebie</div>
</div>

<script type="text/javascript">
function f(){
var n=new Date();
var h=n.getHours();if(h<10)h='0'+h;
var m=n.getMinutes();if(m<10)m='0'+m;
var s=n.getSeconds();if(s<10)s='0'+s;
var d=n.getDate();if(d<10)d='0'+d;
var o=n.getMonth()+1;if(o<10)o='0'+o;
var y=n.getFullYear();
document.getElementById('a').innerHTML=h+':'+m+':'+s;
document.getElementById('b').innerHTML=d+'.'+o+'.'+y;
}
f();setInterval(f,1000);

setInterval(function(){
document.getElementById('p').src='http://v2.wttr.in/Katowice_0pq_lang=pl_transparency=200.png?'+new Date().getTime()
},1800000);
</script>
</body>
</html>
